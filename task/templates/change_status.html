<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Update</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* Card */
.card{
    width:100%;
    max-width:420px;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* Title */
h2{
    text-align:center;
    color:#1e3a8a;
    margin-bottom:25px;
    font-size:30px;
}

/* Label */
label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

/* Select */
select{
    width:100%;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:16px;
    background:#f9fafb;
    outline:none;
    margin-bottom:20px;
}

select:focus{
    border-color:#2563eb;
}

/* Buttons */
.actions{
    display:flex;
    gap:12px;
}

.btn,
.back-btn{
    flex:1;
    text-align:center;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
    transition:0.3s;
}

/* Change Button */
.btn{
    background:#22c55e;
    color:white;
}

.btn:hover{
    background:#16a34a;
    transform:translateY(-2px);
}

/* Back Button */
.back-btn{
    background:#ef4444;
    color:white;
}

.back-btn:hover{
    background:#dc2626;
    transform:translateY(-2px);
}

/* Small text */
.info{
    text-align:center;
    margin-top:18px;
    color:#666;
    font-size:14px;
}

/* Mobile */
@media(max-width:500px){

    .card{
        padding:25px;
    }

    .actions{
        flex-direction:column;
    }

    h2{
        font-size:26px;
    }
}
</style>
</head>

<body>

<div class="card">

<h2>Update Status</h2>

<form method="post">
{% csrf_token %}

<label>Select Task Status</label>

<select name="status">
    <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
    <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>In Progress</option>
    <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
</select>

<div class="actions">
    <button type="submit" class="btn">Change</button>
    <a href="{% url 'dashboard' %}" class="back-btn">Go Back</a>
</div>

</form>

<p class="info">Update your task progress anytime.</p>

</div>

</body>
</html>
