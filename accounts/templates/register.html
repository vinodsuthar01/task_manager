<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #2980b9, #6dd5fa);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box{
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        .form-box h2{
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        input, select{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus{
            border-color: #2980b9;
            box-shadow: 0 0 5px rgba(41,128,185,0.5);
        }
        .btn{
             width: 100%;
            padding: 10px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
            text-decoration: none;
        }

        button{
            width: 100%;
            padding: 10px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.3s;
            
        }

        button:hover{
            background: #1f6391;
        }
    </style>
    <title>Register</title>
</head>
<body>
    
    
        <form method="post" class="form-box">

            {% csrf_token %}

            <h2>Register</h2>

            {% for m in messages %}
                <p>{{m}}</p>
            {% endfor %}

            <input type="text" name="fname" placeholder="First Name" required >
            <input type="text" name="lname" placeholder="Last Name" required >
            <input type="text" name="uname" placeholder="User Name" required >
            <input type="password" name="pass1" placeholder="Password" required >
            <input type="password" name="pass2" placeholder="Confirm Password" required >
            <button type="submit">Register</button class='btn'> 
            <p>
                already have account 
                <a href="{% url 'login' %}"class="btn">Login</a>
                <a href="{% url 'home' %}" class="btn">go back</a>
            </p>
             

        </form>
</body>
</html>
